<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>jQuery Ajax Example</title>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script> 
</head>
<body>
    <p id="fullname">Загрузка...</p>

    <script>
        $(document).ready(function () {
            $.ajax({
                url: "/api/name",
                type: "GET",
                dataType: "json",
                success: function (data) {
                    $("#fullname").text(`${data.lastName} ${data.firstName} ${data.middleName}`);
                },
                error: function () {
                    $("#fullname").text("Ошибка загрузки данных.");
                }
            });
        });
    </script>
</body>
</html>
