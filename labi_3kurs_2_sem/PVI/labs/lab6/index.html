<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отправка почты</title>
</head>
<body>
  <h1>Отправить письмо</h1>
  <form action="/send" method="POST">
    <label for="from">Отправитель:</label>
    <input type="email" id="from" name="from" required><br><br>

    <label for="to">Получатель:</label>
    <input type="email" id="to" name="to" required><br><br>

    <label for="message">Сообщение:</label><br>
    <textarea id="message" name="message" rows="10" cols="30" required></textarea><br><br>

    <button type="submit">Отправить</button>
  </form>
</body>
</html>
